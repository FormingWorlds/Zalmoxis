name: Zalmoxis tests

on:
  push:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

# Push and PR CI: unit tests only, on ubuntu + macos. Targets <5 min
# wall. Smoke and integration tests (full Picard solves) live in the
# scheduled nightly workflow ``Nightly`` instead — running them on
# every push burns ~30-60 min CI time per commit and gives no
# additional bug-finding signal that the unit suite doesn't already
# cover.
jobs:
  test-fast:
    name: Zalmoxis-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Prevent coverage threshold decreases vs main
        # Pre-flight check: fail the PR if pyproject.toml's coverage
        # `fail_under` ratchet was lowered vs `origin/main`. Skips per
        # target if the key is missing on either side. Same idiom as
        # PROTEUS's ci-pr-checks.yml (Prevent threshold decreases vs main).
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          git fetch origin main
          python - <<'PY'
          import pathlib
          import subprocess
          import tomllib

          base = "origin/main"
          current = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          base_text = subprocess.check_output(["git", "show", f"{base}:pyproject.toml"], text=True)
          base_data = tomllib.loads(base_text)

          paths = {
              "full": ["tool", "coverage", "report", "fail_under"],
          }

          def get_val(data, path):
              try:
                  for key in path:
                      data = data[key]
              except KeyError:
                  return None
              return float(data)

          for label, path in paths.items():
              cur = get_val(current, path)
              base_val = get_val(base_data, path)

              if base_val is None or cur is None:
                  print(f"Skipping {label} check (missing in base or current)")
                  continue

              if cur < base_val:
                  raise SystemExit(f"{label} fail_under decreased: {cur} < {base_val}")

          print("Coverage thresholds have not decreased vs main.")
          PY

      - name: Set ZALMOXIS_ROOT environment variable
        run: echo "ZALMOXIS_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # from pyproject.toml
          pip install pytest pytest-cov pytest-xdist ruff zensical markdown-include mkdocstrings[python] pymdown-extensions

      - name: Cache Zalmoxis EOS data
        id: cache-zalmoxis-data
        uses: actions/cache@v4
        with:
          path: data
          key: zalmoxis-data-${{ runner.os }}-${{ hashFiles('tools/setup/get_zalmoxis.sh', 'tools/setup/setup_zalmoxis.py', 'tools/setup/setup_utils.py') }}

      - name: Download required input/output files
        if: steps.cache-zalmoxis-data.outputs.cache-hit != 'true'
        run: |
          bash tools/setup/get_zalmoxis.sh

      - name: Lint with Ruff
        run: |
          ruff check

      - name: Validate test marker structure
        # Element 8 of the PROTEUS Ecosystem Testing Standard. Walks
        # every test_*.py under tests/ and fails if any def test_*
        # lacks one of unit / smoke / integration / slow / skip (either
        # via @pytest.mark.<marker>, an enclosing class decorator, or a
        # module-level pytestmark assignment).
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          bash tools/validate_test_structure.sh

      - name: Run unit + smoke tests
        run: |
          pytest -m "(unit or smoke) and not skip" -n auto -o "addopts=" -o "junit_family=legacy" \
            --junitxml=junit.xml \
            --cov=zalmoxis --cov-report=json:coverage-pr.json --cov-report=xml --cov-fail-under=0

      - name: Download last nightly coverage artifact
        # Best-effort fetch of the most recent successful nightly run on
        # main. The PR-side coverage from the unit + smoke step above is
        # combined with this nightly artifact (which carries unit + smoke
        # + integration line coverage) to estimate the projected combined
        # coverage on the PR head. Uses ``gh run download`` (first-party
        # GitHub CLI; preinstalled on ubuntu-latest) rather than a
        # third-party download-artifact action.
        id: nightly-dl
        if: ${{ matrix.os == 'ubuntu-latest' && !cancelled() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p nightly-coverage
          RUN_ID=$(gh run list \
            --workflow=nightly.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId' || true)
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No successful nightly run on main; coverage union estimation skipped."
            echo "no_artifact=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! gh run download "$RUN_ID" -n nightly-coverage -D nightly-coverage --repo "$GITHUB_REPOSITORY" 2>/tmp/dl.err; then
            echo "::warning::nightly-coverage artifact unavailable (run $RUN_ID): $(cat /tmp/dl.err)"
            echo "no_artifact=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "no_artifact=false" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          ls -la nightly-coverage/

      - name: Estimate combined coverage (PR + nightly union)
        # Reads the PR-side coverage-pr.json and the nightly-side
        # coverage.json, line-ORs the executed-line sets, and reports
        # the projected combined coverage as a job summary plus
        # GITHUB_OUTPUT keys (mirrors PROTEUS's ci-pr-checks.yml
        # ``Validate coverage and write outputs`` step). Warns but does
        # not fail when the nightly artifact is missing or stale (>7
        # days old); the hard 95% gate is enforced by the nightly
        # workflow itself, not here.
        id: coverage-union
        if: ${{ matrix.os == 'ubuntu-latest' && !cancelled() }}
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          import pathlib
          import sys
          import tomllib
          from datetime import datetime, timedelta, timezone

          STALE_DAYS = 7
          GRACE = 0.3  # percentage points

          def load(path):
              p = pathlib.Path(path)
              if not p.exists():
                  return None
              try:
                  return json.loads(p.read_text())
              except (json.JSONDecodeError, OSError):
                  return None

          def line_set(data):
              s = set()
              if not data:
                  return s
              for fpath, fd in data.get('files', {}).items():
                  norm = fpath.replace('\\', '/')
                  if 'src/' in norm:
                      norm = 'src/' + norm.split('src/', 1)[1]
                  for line in (fd.get('executed_lines') or []):
                      s.add((norm, line))
              return s

          def executable_set(data):
              s = set()
              if not data:
                  return s
              for fpath, fd in data.get('files', {}).items():
                  norm = fpath.replace('\\', '/')
                  if 'src/' in norm:
                      norm = 'src/' + norm.split('src/', 1)[1]
                  for line in (fd.get('executed_lines') or []) + (fd.get('missing_lines') or []):
                      s.add((norm, line))
              return s

          pr = load('coverage-pr.json')
          nightly = load('nightly-coverage/coverage.json')
          ts_path = pathlib.Path('nightly-coverage/nightly-timestamp.txt')

          pr_pct = (pr or {}).get('totals', {}).get('percent_covered', 0.0)
          nightly_pct = (nightly or {}).get('totals', {}).get('percent_covered', 0.0)

          stale = False
          if ts_path.exists():
              try:
                  ts = datetime.fromisoformat(ts_path.read_text().strip().replace('Z', '+00:00'))
                  age = datetime.now(timezone.utc) - ts
                  stale = age > timedelta(days=STALE_DAYS)
              except ValueError:
                  pass

          # Read full threshold from pyproject.toml
          py = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          full_threshold = float(py['tool']['coverage']['report'].get('fail_under', 0))

          if pr is None:
              print('# Coverage union estimation\n')
              print('PR coverage JSON missing; skipped.')
              sys.exit(0)

          # Compute union
          pr_exec = line_set(pr)
          ni_exec = line_set(nightly)
          pr_all = executable_set(pr)
          ni_all = executable_set(nightly)
          union_exec = pr_exec | ni_exec
          union_all = pr_all | ni_all
          if union_all:
              est_pct = 100.0 * len(union_exec) / len(union_all)
          else:
              est_pct = 0.0

          drop = full_threshold - est_pct
          # The PR step is advisory; the hard 95% gate runs in the
          # nightly workflow. Status names reflect that: ``ok`` and
          # ``warn`` only, no ``fail`` value, to avoid implying that
          # this step itself enforces the threshold.
          status = 'ok' if drop <= GRACE else 'warn'

          # Write outputs for downstream steps
          out = pathlib.Path(os.environ.get('GITHUB_OUTPUT', '/tmp/o.txt'))
          with open(out, 'a') as f:
              f.write(f'unit_pct={pr_pct:.2f}\n')
              f.write(f'nightly_pct={nightly_pct:.2f}\n')
              f.write(f'est_covered_union={len(union_exec)}\n')
              f.write(f'est_total_union={len(union_all)}\n')
              f.write(f'estimated_total={est_pct:.2f}\n')
              f.write(f'coverage_drop={drop:.2f}\n')
              f.write(f'coverage_status={status}\n')
              f.write(f'threshold={full_threshold}\n')

          print('# Coverage union estimation\n')
          print(f'| metric | value |\n|---|---|')
          print(f'| PR (unit + smoke) | {pr_pct:.2f}% |')
          print(f'| Last nightly (full) | {nightly_pct:.2f}% |')
          print(f'| Estimated combined | {est_pct:.2f}% |')
          print(f'| Threshold (main) | {full_threshold:.2f}% |')
          print(f'| Drop vs threshold | {drop:.2f} pp |')
          print(f'| Status | {status} |')
          if stale:
              print('\nNote: nightly artifact older than 7 days; estimate may be stale.')
          if nightly is None:
              print('\nNote: no nightly artifact downloaded; estimate uses PR coverage only.')
          PY

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: junit.xml

      - name: Build documentation (Zensical)
        run: |
          zensical build --clean
