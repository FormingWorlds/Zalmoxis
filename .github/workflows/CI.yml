name: Zalmoxis tests

on:
  push:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

# Push and PR CI: unit tests only, on ubuntu + macos. Targets <5 min
# wall. Smoke and integration tests (full Picard solves) live in the
# scheduled nightly workflow ``Nightly`` instead — running them on
# every push burns ~30-60 min CI time per commit and gives no
# additional bug-finding signal that the unit suite doesn't already
# cover.
jobs:
  test-fast:
    name: Zalmoxis-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Set ZALMOXIS_ROOT environment variable
        run: echo "ZALMOXIS_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # from pyproject.toml
          pip install pytest pytest-xdist pytest-cov ruff zensical markdown-include mkdocstrings[python] pymdown-extensions

      - name: Cache Zalmoxis EOS data
        id: cache-zalmoxis-data
        uses: actions/cache@v4
        with:
          path: data
          key: zalmoxis-data-${{ runner.os }}-${{ hashFiles('tools/setup/get_zalmoxis.sh', 'tools/setup/setup_zalmoxis.py', 'tools/setup/setup_utils.py') }}

      - name: Download required input/output files
        if: steps.cache-zalmoxis-data.outputs.cache-hit != 'true'
        run: |
          bash tools/setup/get_zalmoxis.sh

      - name: Lint with Ruff
        run: |
          ruff check

      - name: Run unit tests with coverage
        run: |
          pytest -m "unit and not slow" -n auto -o "addopts=" -o "junit_family=legacy" \
            --junitxml=junit.xml \
            --cov=zalmoxis --cov-report=xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: junit.xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: coverage.xml
          fail_ci_if_error: false

      - name: Build documentation (Zensical)
        run: |
          zensical build --clean
