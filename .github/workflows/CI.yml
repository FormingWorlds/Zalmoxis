name: Zalmoxis tests

on:
  push:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  Zalmoxis-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Set ZALMOXIS_ROOT environment variable
        run: echo "ZALMOXIS_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # from pyproject.toml
          pip install pytest pytest-cov pytest-xdist ruff zensical markdown-include mkdocstrings[python] pymdown-extensions

      # PALEOS / WolfBower2018 / Seager2007 EOS tables (~600 MB) are
      # downloaded by tools/setup/get_zalmoxis.sh from Zenodo. The
      # download itself is ~2-2.5 min on every CI run; cache it keyed
      # on the script + setup_utils content so the cache is invalidated
      # automatically when the table set or download logic changes.
      - name: Cache Zalmoxis EOS data
        id: cache-zalmoxis-data
        uses: actions/cache@v4
        with:
          path: data
          key: zalmoxis-data-${{ runner.os }}-${{ hashFiles('tools/setup/get_zalmoxis.sh', 'tools/setup/setup_zalmoxis.py', 'tools/setup/setup_utils.py') }}

      - name: Download required input/output files
        if: steps.cache-zalmoxis-data.outputs.cache-hit != 'true'
        run: |
          bash tools/setup/get_zalmoxis.sh

      - name: Lint with Ruff
        run: |
          ruff check

      # Default CI runs only the fast unit tier (``unit and not slow``).
      # The slow tier is exercised by a dedicated nightly workflow or
      # via manual ``pytest -m slow`` locally; it covers the heavier
      # parity / convergence tests that take 50-300s each.
      - name: Run unit tests with coverage
        run: |
          pytest -m "unit and not slow" -n auto -o "addopts=" -o "junit_family=legacy" \
            --cov=zalmoxis --cov-report=term-missing --cov-report=xml \
            --junitxml=junit.xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: coverage.xml
          fail_ci_if_error: false

      # Codecov Test Analytics: surfaces flaky tests, per-test runtime
      # trends, and cross-platform failure patterns. Uploads from both
      # macos-latest and ubuntu-latest so platform-specific flakes (e.g.
      # the 2026-05-02 BLAS-noise basin attractor that hit Linux x86_64
      # but not macOS arm64) are visible side-by-side. Runs on
      # ``!cancelled()`` so upload still happens on test failure, which
      # is exactly when the analytics are most useful.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: junit.xml

      - name: Build documentation (Zensical)
        run: |
          zensical build --clean