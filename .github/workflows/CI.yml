name: Zalmoxis tests

on:
  push:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  Zalmoxis-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Set ZALMOXIS_ROOT environment variable
        run: echo "ZALMOXIS_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # from pyproject.toml
          pip install pytest pytest-cov pytest-xdist ruff zensical markdown-include mkdocstrings[python] pymdown-extensions

      - name: Download required input/output files
        run: |
          bash src/get_zalmoxis.sh

      - name: Lint with Ruff
        run: |
          ruff check

      - name: Run unit tests with coverage
        run: |
          pytest -m unit -n auto -o "addopts=" --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: coverage.xml
          fail_ci_if_error: false

      - name: Build documentation (Zensical)
        run: |
          zensical build --clean