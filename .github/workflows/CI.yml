name: Zalmoxis tests

on:
  push:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  # Fast feedback loop: unit-and-not-slow on both ubuntu and macos, no
  # coverage instrumentation. Coverage adds ~5-10x wall on cold CI even
  # when the underlying tests run in seconds locally; running cov on a
  # separate parallel job keeps push CI under 10 min for green/red
  # signal while preserving full coverage uploads.
  test-fast:
    name: Zalmoxis-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Set ZALMOXIS_ROOT environment variable
        run: echo "ZALMOXIS_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # from pyproject.toml
          pip install pytest pytest-xdist ruff zensical markdown-include mkdocstrings[python] pymdown-extensions

      - name: Cache Zalmoxis EOS data
        id: cache-zalmoxis-data
        uses: actions/cache@v4
        with:
          path: data
          key: zalmoxis-data-${{ runner.os }}-${{ hashFiles('tools/setup/get_zalmoxis.sh', 'tools/setup/setup_zalmoxis.py', 'tools/setup/setup_utils.py') }}

      - name: Download required input/output files
        if: steps.cache-zalmoxis-data.outputs.cache-hit != 'true'
        run: |
          bash tools/setup/get_zalmoxis.sh

      - name: Lint with Ruff
        run: |
          ruff check

      - name: Run unit tests
        run: |
          pytest -m "unit and not slow" -n auto -o "addopts=" -o "junit_family=legacy" \
            --junitxml=junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: junit.xml

      - name: Build documentation (Zensical)
        run: |
          zensical build --clean

  # Coverage job: unit + integration tests with coverage instrumentation.
  # Includes integration tests (excluded from test-fast) because the
  # main solver.py is exercised almost entirely through them; without
  # integration coverage solver.py sits at ~35 % and pulls total below
  # 80 %. Runs in parallel with test-fast so it never blocks PR
  # feedback. Ubuntu-only because Codecov ingests one report per push
  # and Ubuntu/macOS coverage is nearly identical.
  coverage:
    name: Zalmoxis-coverage (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Set ZALMOXIS_ROOT environment variable
        run: echo "ZALMOXIS_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest pytest-cov pytest-xdist

      - name: Cache Zalmoxis EOS data
        id: cache-zalmoxis-data
        uses: actions/cache@v4
        with:
          path: data
          key: zalmoxis-data-${{ runner.os }}-${{ hashFiles('tools/setup/get_zalmoxis.sh', 'tools/setup/setup_zalmoxis.py', 'tools/setup/setup_utils.py') }}

      - name: Download required input/output files
        if: steps.cache-zalmoxis-data.outputs.cache-hit != 'true'
        run: |
          bash tools/setup/get_zalmoxis.sh

      - name: Run unit + integration tests with coverage
        run: |
          pytest -m "(unit or integration) and not slow" -n auto -o "addopts=" \
            --cov=zalmoxis --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/Zalmoxis
          files: coverage.xml
          fail_ci_if_error: false
