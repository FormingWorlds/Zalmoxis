name: Refresh test count badges

on:
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'tools/generate_test_badges.py'
      - '.github/workflows/publish-test-badges.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: badges-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-badges:
    name: Regenerate tests-*.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Install Zalmoxis and pytest
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest pytest-xdist

      - name: Regenerate badge JSON files
        run: |
          python tools/generate_test_badges.py --out .github/badges/

      - name: Commit and push if changed
        # Concurrency group ``badges-${{ github.ref }}`` does not
        # cancel-in-progress, so two pushes to main within seconds can
        # both run this step. The second run rebases its own bot commit
        # onto the up-to-date HEAD before pushing to avoid a
        # non-fast-forward rejection that would silently lose the badge
        # update under ``[skip ci]``.
        run: |
          set -e
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add .github/badges/
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
            exit 0
          fi
          git commit -m "ci: refresh test count badges [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
              echo "Pushed badge refresh on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; retrying after rebase."
            sleep 2
          done
          echo "Failed to push badge refresh after 3 attempts." >&2
          exit 1
