coverage:
  # Badge colour gradient: red at 70%, bright green at 90%.
  # Matches the PROTEUS ecosystem 90% coverage ceiling.
  range: "70...90"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%
comment:
  layout: "reach, diff, flags, files"
  require_changes: true
