# Reproducible performance-baseline config for the Zalmoxis speedup plan.
#
# Usage:
#   python -m tools.benchmarks.bench_performance --config=input/bench_performance.toml \
#       --baseline=tests/data/bench_performance_baseline.npz
#
# Uses the mantle EOS from Stage 1b production (PALEOS-2phase:MgSiO3 with
# mushy_zone_factor=0.80) to exercise the same hot paths as PROTEUS.
# Numerical solver params intentionally left unset so solver._default_solver_params()
# chooses mass-adaptive defaults. This keeps the bench aligned with
# production calls rather than a hand-tuned tighter regime.

[InputParameter]
planet_mass                = 1

[AssumptionsAndInitialGuesses]
core_mass_fraction         = 0.325
mantle_mass_fraction       = 0
temperature_mode           = "adiabatic"
surface_temperature        = 3000
center_temperature         = 6000
temperature_profile_file   = "temp_profile.txt"

[EOS]
core                       = "PALEOS:iron"
mantle                     = "PALEOS-2phase:MgSiO3"
ice_layer                  = ""
condensed_rho_min          = 322.0
condensed_rho_scale        = 50.0
binodal_T_scale            = 50.0
mushy_zone_factor          = 0.80

[Calculations]
num_layers                 = 150

[Output]
data_output_enabled        = false
plotting_enabled           = false
verbose                    = false
plot_filename              = "struct.png"
data_filename              = "struct.dat"
