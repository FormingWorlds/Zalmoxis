# Default config file for Zalmoxis planetary structure code

[InputParameter]
planet_mass                = 1 # Mass of the planet (in Earth masses = 5.972e24 kg)

[AssumptionsAndInitialGuesses]
core_mass_fraction         = 0.325 # Initial guess for the core mass as a fraction of the total mass
mantle_mass_fraction       = 0 # Initial guess for the mantle mass as a fraction of the total mass
temperature_mode           = "linear" # Choice of input temperature profile: "isothermal", "linear", "prescribed", "adiabatic"
surface_temperature        = 3500 # Surface temperature (K), required for temperature_mode="isothermal", "linear", or "adiabatic", ignored otherwise
center_temperature         = 6000 # Central temperature (K), required for temperature_mode="linear" or "adiabatic" (initial guess), ignored otherwise
temperature_profile_file   = "temp_profile.txt" # Filename containing a prescribed temperature profile, required for temperature_mode="prescribed"

[EOS]
# Per-layer EOS selection. Format: "<source>:<composition>"
# Valid values:
#   "Seager2007:iron"       - Seager+2007 tabulated Fe epsilon (300K)
#   "Seager2007:MgSiO3"    - Seager+2007 tabulated MgSiO3 perovskite (300K)
#   "Seager2007:H2O"       - Seager+2007 tabulated water ice (300K)
#   "WolfBower2018:MgSiO3"  - Wolf&Bower+2018 T-dependent MgSiO3 (melt/solid), limited to <= 7 M_earth
#   "RTPress100TPa:MgSiO3"  - Extended RTpress MgSiO3 melt EOS (up to 100 TPa)
#   "PALEOS:MgSiO3"         - PALEOS MgSiO3 solid+liquid EOS with nabla_ad (up to 100 TPa)
#   "Analytic:<material>"   - Seager+2007 analytic polytrope (300K, no data needed)
#     Valid analytic materials: iron, MgSiO3, MgFeSiO3, H2O, graphite, SiC
core                       = "Seager2007:iron"
mantle                     = "WolfBower2018:MgSiO3"
ice_layer                  = ""  # Empty = 2-layer model; set for 3-layer model

# Melting curve selection for T-dependent mantle EOS (solidus/liquidus)
# Valid rock_solidus values:
#   "Monteux16-solidus"         - Monteux+2016 Eqs. 10/12 (analytic, all P, default)
#   "Monteux600-solidus-tabulated"        - Tabulated with fixed 600 K gap (legacy, P <= 999 GPa)
# Valid rock_liquidus values:
#   "Monteux16-liquidus-A-chondritic"    - Monteux+2016 Eq. 11/13 A-chondritic (default)
#   "Monteux16-liquidus-F-peridotitic"   - Monteux+2016 Eq. 11/13 F-peridotitic
#   "Monteux600-liquidus-tabulated"      - Tabulated with fixed 600 K gap (legacy, P <= 999 GPa)
rock_solidus               = "Monteux16-solidus"
rock_liquidus              = "Monteux16-liquidus-A-chondritic"

[Calculations]
num_layers                 = 150 # Number of planet layers

[IterativeProcess]
max_iterations_outer       = 100 # Maximum number of iterations for the outer loop
tolerance_outer            = 3e-3 # Convergence tolerance for the outer loop
max_iterations_inner       = 100 # Maximum number of iterations for the inner loop
tolerance_inner            = 1e-4 # Convergence tolerance for the inner loop
relative_tolerance         = 1e-5 # Relative tolerance for solve_ivp
absolute_tolerance         = 1e-6 # Absolute tolerance for solve_ivp
maximum_step               = 250000 # Maximum integration step size for solve_ivp (m)
adaptive_radial_fraction   = 0.98 # Fraction (0–1) of the radial domain defining where solve_ivp transitions from adaptive integration to fixed-step integration when using the temperature-dependent "WolfBower2018:MgSiO3" EOS
max_center_pressure_guess  = 10e12 # Maximum center pressure guess (Pa). Center is always iron core (Seager2007, valid to 1e21 Pa).

[PressureAdjustment]
target_surface_pressure    = 101325 # Target surface pressure (Pa)
pressure_tolerance         = 1e9 # Convergence tolerance for surface pressure convergence (Pa)
max_iterations_pressure    = 200 # Maximum iterations for pressure adjustment loop

[Output]
data_enabled               = true # Flag to enable saving data to a file (true/false)
plots_enabled              = false # Flag to enable plotting the profile results in post_processing() (true/false)
verbose                    = false # If true, logs detailed convergence info and warnings; if false, only essential messages are shown (true/false)
iteration_profiles_enabled = false # If true, writes pressure and density profiles for each iteration to files (true/false)
