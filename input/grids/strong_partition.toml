# Strong-partition validation grid: sweep planet mass, mantle H2O,
# and surface temperature to span fully-molten and partially-molten
# mantle states. Closes issue #65's acceptance criterion of a
# monotonic radius response in X_i and phi_avg.

[base]
config = "input/default.toml"

[sweep]
planet_mass = [1.0, 3.0, 5.0, 10.0]
mantle = [
    "PALEOS:MgSiO3",
    "PALEOS:MgSiO3:0.95+PALEOS:H2O:0.05",
    "PALEOS:MgSiO3:0.90+PALEOS:H2O:0.10",
    "PALEOS:MgSiO3:0.80+PALEOS:H2O:0.20",
]
surface_temperature = [2000, 3000, 4000]
partition_rule = ["strong"]

[output]
dir = "output/grid_strong_partition"
save_profiles = true  # per-cell radial profile for post-hoc mass conservation check
